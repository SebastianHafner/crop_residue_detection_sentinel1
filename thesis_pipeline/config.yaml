# =============================================================================
# config/config.yaml
# Master configuration for the crop residue detection pipeline.
# All paths, model settings, and training hyperparameters live here.
# Edit this file — never hardcode values in scripts.
# =============================================================================

seed: 42
debug: false          # true → disables wandb, uses num_workers=0
log_freq: 10          # log training loss every N global steps

paths:
  # Root of your extracted per-field dataset
  dataset_path: /home/johan/Thesis/Sentinel_1/ost/s1/S1_Timeseries/dataset

  # JSON file listing all samples with their train/val/test split
  # Generated by scripts/build_samples_json.py
  samples_file: /home/johan/Thesis/Sentinel_1/ost/s1/S1_Timeseries/dataset/samples.json

  # Field geometries parquet (SWEREF99TM)
  fields_file: /home/johan/Thesis/Sentinel_1/ost/s1/Example_Fields/example_fields.parquet

  # Where to save model checkpoints, results, figures
  output_path: /home/johan/Thesis/output

model:
  name: psenet           # psenet | random_forest | gradient_boosting | svm
  # Number of input features per pixel per timestep:
  #   S1: gamma0_VV, gamma0_VH, Entropy, Anisotropy, Alpha, DpRVI  → 6
  #   S2: B2, B3, B4, B8, B11, B12                                  → 6
  #   Total:                                                         → 12
  in_channels: 12
  out_channels: 2        # binary: 0=no residue, 1=residue

  # Pixel encoder
  mlp1: [32, 64]         # hidden dims after input_dim
  pooling: mean_std      # mean_std | mean | std | mean_std_max
  mlp2: [128, 128]       # dims after pooling (first must equal mlp1[-1]*n_pool_ops)

  # Temporal attention encoder
  embed_dim: 128         # E — must match mlp2[-1]
  n_heads: 4
  n_layers: 2
  dropout: 0.2

  # Classifier head
  mlp4: [128, 64, 32]    # dims before out_channels

dataloader:
  modality: s1s2         # s1s2 | s1 | s2
  target: residue_label  # column name in samples.json
  n_pixels: 64           # fixed pixel set size per field
  num_workers: 4
  shuffle: true

  # Sentinel-2 normalisation (divide raw int16 reflectance by this)
  s2_normalization: 10000.0
  s2_band_indices: [0, 1, 2, 3, 4, 5]   # B2 B3 B4 B8 B11 B12

  augmentations:
    pixel_set: true
    random_flip: false      # not meaningful for pixel sets
    random_rotate: false
    color_shift: true
    gamma_correction: true

trainer:
  epochs: 100
  batch_size: 32
  lr: 1.0e-3
  weight_decay: 1.0e-4
  grad_clip: 1.0
  lr_scheduler: plateau    # plateau | step | linear | none
  patience: 15             # early stopping patience (epochs)
  max_eval_samples: null   # null = use full val set; int = subsample for speed
  loss: CrossEntropy
  # Class weights for imbalanced dataset [no_residue_weight, residue_weight]
  # Set residue weight higher if residue fields are minority class
  class_weights: [1.0, 3.0]

wandb:
  project: crop-residue-skane
  entity: null             # your wandb username or team, or null
